# Server
server.port=8080

# DataSource
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:paymentdb}
spring.datasource.username=${DB_USER:payment_user}
spring.datasource.password=${DB_PASSWORD:payment_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# Spring Data JDBC
# No Hibernate, Spring Data JDBC uses plain SQL under the hood.
spring.sql.init.mode=never

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# OpenAPI / Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Encryption
# AES-256-GCM requires a 32-byte (256-bit) key, Base64-encoded.
# Generate one with: openssl rand -base64 32
encryption.secret-key=${ENCRYPTION_SECRET_KEY:3Lr9QkF5Tz6dJ1mX2fVh7aNb0p8cZtRwUuYx2BdQ1oA=}

# Webhook Delivery
webhook.retry.max-attempts=3
# Delays in milliseconds: attempt 1=10s, 2=30s, 3=90s (exponential backoff)
webhook.retry.initial-delay-ms=10000
webhook.retry.multiplier=3
# HTTP client timeout per webhook call
webhook.http.connect-timeout-ms=5000
webhook.http.read-timeout-ms=10000

# Logging
logging.level.com.example.payment=INFO
logging.level.org.springframework.data.jdbc=DEBUG
