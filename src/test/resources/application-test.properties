# Testcontainers will override the datasource URL at runtime.
# These are safe fallback values ? actual DB is spun up by @Testcontainers.
spring.datasource.url=jdbc:tc:postgresql:16:///paymentdb
spring.datasource.driver-class-name=org.testcontainers.jdbc.ContainerDatabaseDriver
spring.flyway.enabled=true
# Use a fixed test key (32 bytes Base64)
encryption.secret-key=dGVzdC1rZXktZm9yLXRlc3RzLW9ubHktMTIzNDU2Nzg=
# Speed up retries in tests
webhook.retry.max-attempts=2
webhook.retry.initial-delay-ms=100
webhook.retry.multiplier=2